<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UpStyle - Login</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>

<body>
    <header>
        <div id="cabecalho">
            <h1>Up<strong>Style</strong></h1>
        </div>
        <div id="menu">
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="carrinho.html">Carrinho(<span>0</span>)</a></li>
                    <li id="menu-auth"><a href="cadastro.html">Cadastro</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="auth-container">
        <h1>Login</h1>
        <form id="form-login">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="Digite seu e-mail">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn-auth">Entrar</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a>
        </p>
    </div>
    <script type="module" src="../scripts/global.js"></script>
    <script type="module" src="../scripts/login.js"></script>
</body>

</html>
