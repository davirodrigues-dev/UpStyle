<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../styles/global.css" />
    <title>UpStyle | Cadastro</title>
  </head>

  <body>
    <header>
        <div id="cabecalho">
        <h1>Up<strong>Style</strong></h1>
      </div>
      <div id="menu">
        <nav>
          <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="carrinho.html">Carrinho(<span>0</span>)</a></li>
            <li id="menu-auth"><a href="cadastro.html">Cadastro</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="auth-container">
        <h1>Criar Conta</h1>
        <form id="form-cadastro">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: João Silva">
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" required placeholder="Crie uma senha">
            </div>
            <button type="submit" class="btn-auth">Cadastrar</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">Já tem uma conta? <a href="login.html">Faça login</a></p>
    </main>

    <div id="rodape">
      <p>&copy; 2026 UpStyle. Todos os direitos reservados.</p>
    </div>

    <script type="module" src="../scripts/global.js"></script>
    <script type="module" src="../scripts/cadastro.js"></script>
  </body>
</html>
